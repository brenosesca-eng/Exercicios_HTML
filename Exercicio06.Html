<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <header>
        <h1>Locação de Autos do Sesca</h1>
        <img src="img/Rolls.jpg" width="20%">
        <p>Trabalhando na área há mais de 25 anos</p>
    </header>
    <hr>
    <main>
        <section>
            <h3>Cadastro</h3>
            <p>Preencha abaixo as respectivas informações para entendermos melhor sobre você e seus desejos.</p>
            <form method="post" action="#">
                <fieldset>
                    <legend>Dados Pessoais</legend>
                    <label>Nome</label>
                    <input type="text" name="nome" placeholder="digite seu nome" required>
                    <label>Data de Nascimento</label>
                    <input type="date" name="data_nascimento" required>
                    <label>Telefone</label>
                    <input type="tel" name="telefone" placeholder="(XX) XXXXX-XXXX" required>
                </fieldset>
                <fieldset>
                    <legend>CNH</legend>
                    <label>Número do Registro</label>
                    <input type="number" name="numero_registro" placeholder="informe o número da sua CNH" required>
                    <label>Validade</label>
                    <input type="date" name="validade" required>
                </fieldset>
                <fieldset>Carro</fieldset>
                <label>Modelo do Carro</label>
                <select name="carro" required>
                    <option value="">Escolha um carro</option>
                    <optgroup label="Volkswagem">
                        <option value="gol">Gol</option>
                        <option value="golf">Golf</option>
                        <option value="fox">Fox</option>
                    </optgroup>
                    <optgroup label="Fiat">
                        <option value="uno">Uno</option>
                        <option value="siena">Siena</option>
                        <option value="Palio">Palio</option>
                    </optgroup>
                    <optgroup label="Nissan">
                        <option value="frontier">Frontier</option>
                        <option value="versa">Versa</option>
                        <option value="skyline">Skyline GT-R</option>
                    </optgroup>
                </select>
            </fieldset>
            <br>
            <button type="submit">Enviar Dados</button>
            </form>
        </section>
    </main>
    <hr>
    <footer>
        <p>Auto do Sesca agradece ruas respostas!</p>
    </footer>
</body>

</html>
